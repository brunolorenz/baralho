<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baralho Criativo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F7F5F0;
    --surface: #FFFFFF;
    --ink: #1A1916;
    --ink-mid: #6B6860;
    --ink-light: #A8A49C;
    --accent: #1A1916;
    --accent-text: #F7F5F0;
    --border: rgba(26,25,22,0.12);
    --border-strong: rgba(26,25,22,0.25);
    --suit-cor: #C4410B;
    --suit-forma: #155C3A;
    --suit-gesto: #1A3A6B;
    --suit-olhar: #6B2D5E;
    --radius: 14px;
    --radius-sm: 8px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1A1916;
      --surface: #242320;
      --ink: #F0EDE6;
      --ink-mid: #A8A49C;
      --ink-light: #6B6860;
      --border: rgba(240,237,230,0.1);
      --border-strong: rgba(240,237,230,0.22);
      --suit-cor: #F4825A;
      --suit-forma: #4DAF7C;
      --suit-gesto: #6B9FE0;
      --suit-olhar: #C27AB8;
    }
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 0 4rem;
    -webkit-font-smoothing: antialiased;
  }

  header {
    width: 100%;
    max-width: 420px;
    padding: 2.5rem 1.5rem 1.5rem;
    display: flex;
    flex-direction: column;
    gap: 0.15rem;
  }

  header h1 {
    font-size: 1rem;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-mid);
  }

  header p {
    font-size: 0.78rem;
    color: var(--ink-light);
    font-weight: 300;
    letter-spacing: 0.04em;
  }

  .suits-row {
    display: flex;
    gap: 10px;
    padding: 0 1.5rem 1.5rem;
    width: 100%;
    max-width: 420px;
  }

  .suit-btn {
    flex: 1;
    padding: 6px 4px;
    border: 0.5px solid var(--border);
    background: transparent;
    border-radius: var(--radius-sm);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.65rem;
    font-weight: 400;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--ink-mid);
    cursor: pointer;
    transition: all 0.15s ease;
    text-align: center;
  }

  .suit-btn:hover { background: var(--surface); }
  .suit-btn.active { border-color: var(--border-strong); background: var(--surface); color: var(--ink); }
  .suit-btn[data-suit="cor"].active { color: var(--suit-cor); border-color: var(--suit-cor); }
  .suit-btn[data-suit="forma"].active { color: var(--suit-forma); border-color: var(--suit-forma); }
  .suit-btn[data-suit="gesto"].active { color: var(--suit-gesto); border-color: var(--suit-gesto); }
  .suit-btn[data-suit="olhar"].active { color: var(--suit-olhar); border-color: var(--suit-olhar); }

  .card-stage {
    width: 100%;
    max-width: 420px;
    padding: 0 1.5rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.25rem;
  }

  .card {
    width: 100%;
    background: var(--surface);
    border-radius: var(--radius);
    border: 0.5px solid var(--border);
    overflow: hidden;
    transition: opacity 0.25s ease, transform 0.3s cubic-bezier(0.34, 1.4, 0.64, 1);
  }

  .card.entering {
    animation: cardIn 0.4s cubic-bezier(0.34, 1.2, 0.64, 1) both;
  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(18px) rotate(-1.5deg); }
    to { opacity: 1; transform: translateY(0) rotate(0deg); }
  }

  .card-top {
    padding: 1.25rem 1.5rem 1rem;
    border-bottom: 0.5px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }

  .card-suit-label {
    font-size: 0.62rem;
    font-weight: 400;
    letter-spacing: 0.14em;
    text-transform: uppercase;
  }

  .card-number {
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    font-weight: 300;
    color: var(--ink-light);
  }

  .card-body {
    padding: 1.5rem 1.5rem 1.25rem;
  }

  .card-title {
    font-size: 1.45rem;
    font-weight: 500;
    line-height: 1.2;
    margin-bottom: 0.9rem;
    letter-spacing: -0.01em;
  }

  .card-why {
    font-size: 0.85rem;
    line-height: 1.65;
    color: var(--ink-mid);
    font-weight: 300;
    margin-bottom: 1.25rem;
  }

  .card-how-title {
    font-size: 0.62rem;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-light);
    margin-bottom: 0.6rem;
  }

  .card-steps {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }

  .card-step {
    display: flex;
    gap: 0.75rem;
    align-items: flex-start;
    font-size: 0.85rem;
    line-height: 1.55;
    color: var(--ink);
  }

  .step-n {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    font-weight: 300;
    color: var(--ink-light);
    flex-shrink: 0;
    padding-top: 2px;
    min-width: 18px;
  }

  .card-variations {
    padding: 1rem 1.5rem 1.25rem;
    border-top: 0.5px solid var(--border);
    background: var(--bg);
  }

  .variations-title {
    font-size: 0.62rem;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-light);
    margin-bottom: 0.6rem;
  }

  .variations-list {
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
  }

  .variation-item {
    font-size: 0.8rem;
    color: var(--ink-mid);
    line-height: 1.5;
    padding-left: 0.75rem;
    border-left: 1.5px solid var(--border-strong);
    font-style: italic;
    font-weight: 300;
  }

  .card-time {
    padding: 0.75rem 1.5rem;
    border-top: 0.5px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .time-label {
    font-size: 0.7rem;
    color: var(--ink-light);
    letter-spacing: 0.06em;
    font-weight: 300;
  }

  .time-value {
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
    font-weight: 400;
    color: var(--ink-mid);
  }

  .suit-cor .card-suit-label { color: var(--suit-cor); }
  .suit-forma .card-suit-label { color: var(--suit-forma); }
  .suit-gesto .card-suit-label { color: var(--suit-gesto); }
  .suit-olhar .card-suit-label { color: var(--suit-olhar); }

  .suit-cor .variation-item { border-color: var(--suit-cor); }
  .suit-forma .variation-item { border-color: var(--suit-forma); }
  .suit-gesto .variation-item { border-color: var(--suit-gesto); }
  .suit-olhar .variation-item { border-color: var(--suit-olhar); }

  .draw-btn {
    width: 100%;
    padding: 1rem;
    background: var(--ink);
    color: var(--accent-text);
    border: none;
    border-radius: var(--radius);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.88rem;
    font-weight: 400;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: opacity 0.15s ease, transform 0.12s ease;
  }

  .draw-btn:hover { opacity: 0.85; }
  .draw-btn:active { transform: scale(0.98); }

  .empty-state {
    width: 100%;
    background: var(--surface);
    border-radius: var(--radius);
    border: 0.5px dashed var(--border-strong);
    padding: 3rem 1.5rem;
    text-align: center;
  }

  .empty-state p {
    font-size: 0.85rem;
    color: var(--ink-light);
    font-weight: 300;
    line-height: 1.6;
  }

  .counter {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    color: var(--ink-light);
    text-align: center;
    font-weight: 300;
  }

</style>
</head>
<body>

<header>
  <h1>Baralho Criativo</h1>
  <p>exercícios de desenho e percepção</p>
</header>

<div class="suits-row">
  <button class="suit-btn active" data-suit="todos">Todos</button>
  <button class="suit-btn" data-suit="olhar" style="color:var(--suit-olhar)">Olhar</button>
  <button class="suit-btn" data-suit="gesto" style="color:var(--suit-gesto)">Gesto</button>
  <button class="suit-btn" data-suit="forma" style="color:var(--suit-forma)">Forma</button>
  <button class="suit-btn" data-suit="cor" style="color:var(--suit-cor)">Cor</button>
</div>

<div class="card-stage">
  <div class="empty-state" id="emptyState">
    <p>Toque em sortear para<br>receber um exercício.</p>
  </div>
  <div id="cardContainer" style="display:none; width:100%;"></div>
  <p class="counter" id="counter" style="display:none"></p>
  <button class="draw-btn" id="drawBtn">Sortear carta</button>
</div>

    why: "Justaposição de cores puras em pontos ou traços faz o olho misturá-las — a base do pontilhismo e de muitas técnicas digitais. Entender isso muda como você pensa em textura e vibração cromática.",
    steps: [
      "Escolha dois pigmentos complementares: laranja e azul, vermelho e verde.",
      "Crie uma área de transição entre eles usando pontos ou linhas intercaladas.",
      "Varie a densidade para criar tons intermediários sem misturar os pigmentos.",
      "Recue 1 metro e observe o efeito — ele muda completamente com a distância."
    ],
    variations: [
      "Use hachura cruzada com duas cores em vez de pontos.",
      "Tente com três cores que se misturam opticamente para criar um quarto tom.",

  {
    suit: "cor",
    suitLabel: "Cor",
    number: "C·04",

    steps: [

    ],
    variations: [

    ]
  }
];

let selectedSuit = "todos";
let lastCard = null;
let drawnCount = 0;

const suitBtns = document.querySelectorAll('.suit-btn');
const emptyState = document.getElementById('emptyState');
const cardContainer = document.getElementById('cardContainer');
const counter = document.getElementById('counter');
const drawBtn = document.getElementById('drawBtn');

suitBtns.forEach(btn => {
  btn.addEventListener('click', () => {
    suitBtns.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedSuit = btn.dataset.suit;
    drawnCount = 0;
    emptyState.style.display = 'block';
    cardContainer.style.display = 'none';
    counter.style.display = 'none';
    lastCard = null;
    drawBtn.textContent = 'Sortear carta';
  });
});

function getPool() {
  if (selectedSuit === 'todos') return cards;
  return cards.filter(c => c.suit === selectedSuit);
}

function buildCard(card) {
  const suitClass = `suit-${card.suit}`;
  const stepsHtml = card.steps.map((s, i) =>
    `<div class="card-step"><span class="step-n">0${i+1}</span><span>${s}</span></div>`
  ).join('');
  const varsHtml = card.variations.map(v =>
    `<div class="variation-item">${v}</div>`
  ).join('');

  return `<div class="card entering ${suitClass}">
    <div class="card-top">
      <span class="card-suit-label">${card.suitLabel}</span>
      <span class="card-number">${card.number}</span>
    </div>
    <div class="card-body">
      <div class="card-title">${card.title}</div>
      <div class="card-why">${card.why}</div>
      <div class="card-how-title">Como fazer</div>
      <div class="card-steps">${stepsHtml}</div>
    </div>
    <div class="card-variations">
      <div class="variations-title">Variações</div>
      <div class="variations-list">${varsHtml}</div>
    </div>
    <div class="card-time">
      <span class="time-label">tempo sugerido</span>
      <span class="time-value">${card.time}</span>
    </div>
  </div>`;
}

drawBtn.addEventListener('click', () => {
  const pool = getPool();
  if (!pool.length) return;

  let available = pool.filter(c => c !== lastCard);
  if (!available.length) available = pool;

  const card = available[Math.floor(Math.random() * available.length)];
  lastCard = card;
  drawnCount++;

  emptyState.style.display = 'none';
  cardContainer.style.display = 'block';
  cardContainer.innerHTML = buildCard(card);
  counter.style.display = 'block';
  counter.textContent = `${drawnCount} carta${drawnCount > 1 ? 's' : ''} sorteada${drawnCount > 1 ? 's' : ''} nesta sessão`;
  drawBtn.textContent = 'Sortear outra carta';

  cardContainer.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
});
</script>
</body>
</html>
